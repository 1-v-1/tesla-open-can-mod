[env:feather_rp2040_can]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = adafruit_feather_can
framework = arduino
board_build.core = earlephilhower
lib_deps = https://github.com/autowp/arduino-mcp2515.git
build_flags = -DDRIVER_MCP2515

[env:feather_m4_can]
platform = atmelsam
board = adafruit_feather_m4_can
framework = arduino
lib_deps = adafruit/Adafruit CAN
build_flags = -DDRIVER_SAME51 -std=gnu++14
build_unflags = -std=gnu++11

[env:native]
platform = native
build_flags = -std=c++17 -DNATIVE_BUILD
test_filter = test_native_*

[env:esp32_twai]
platform = espressif32
board = esp32dev
framework = arduino
build_flags = -DDRIVER_TWAI -DCAN_TX_PIN=TODO_DEPENDS_ON_BOARD -DCAN_RX_PIN=TODO_DEPENDS_ON_BOARD
build_unflags = -std=gnu++11

[env:m5stack-atomic-can-base]
extends = env:esp32_twai
board = m5stack-atom
build_flags = ${env:esp32_twai.build_flags} -DPIN_LED=27 -DCAN_TX_PIN=22 -DCAN_RX_PIN=19
